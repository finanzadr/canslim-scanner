name: CANSLIM Scanner Diario

on:
  schedule:
    # 21:15 UTC = 5:15pm hora del Este (mercado cierra 4pm ET)
    - cron: "15 21 * * 1-5"
  workflow_dispatch:
    # Permite correr manualmente desde GitHub Actions

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Correr scanner CANSLIM
        run: python -m scanner.runner --universe default
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}

      - name: Commit resultados
        run: |
          git config user.name  "CANSLIM Bot"
          git config user.email "bot@canslim-scanner"
          git add data/
          git diff --staged --quiet || git commit -m "Scanner $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
